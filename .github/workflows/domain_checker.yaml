name: Check Domain Registry & SSL

on:
  schedule:
    - cron:  '30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check_registry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check Registry

    steps:
      - name: Check domain registry expire date
        id: check-domain
        uses: fenbi/action-check-domain@debug
        with:
          url: 123
          check_action: registry
          token: ${{ secrets.GITHUB_TOKEN }}

  check_ssl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check SSL
    steps:
      - uses: actions/checkout@v3
      - name: Check domain SSL expire date
        id: check-domain
        uses: fenbi/action-check-domain@debug
        with:
          url: 123
          check_action: ssl
          token: ${{ secrets.GITHUB_TOKEN }}
